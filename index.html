<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCN票据DIY计算器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .container { max-width: 520px; width: 100%; }
  h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #8b949e; margin-bottom: 28px; line-height: 1.5; }
  .form-group { margin-bottom: 18px; }
  label {
    display: block; font-size: 13px; font-weight: 600;
    color: #8b949e; margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  input {
    width: 100%; padding: 12px 14px; font-size: 18px;
    background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; color: #fff; outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #58a6ff; }
  input::placeholder { color: #484f58; }
  .row { display: flex; gap: 12px; }
  .row .form-group { flex: 1; }
  .hint { font-size: 12px; color: #484f58; margin-top: 4px; }
  .hint.ok { color: #3fb950; }
  .hint.err { color: #f85149; }

  .btn {
    width: 100%; padding: 14px; font-size: 16px; font-weight: 700;
    background: #238636; color: #fff; border: none; border-radius: 8px;
    cursor: pointer; margin-top: 8px; transition: background 0.2s;
  }
  .btn:hover { background: #2ea043; }
  .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  .btn.loading { background: #30363d; }

  .results {
    margin-top: 28px; background: #161b22;
    border: 1px solid #30363d; border-radius: 12px;
    overflow: hidden;
  }
  .results-header {
    padding: 16px 20px; background: #1c2128;
    border-bottom: 1px solid #30363d;
    display: flex; justify-content: space-between; align-items: center;
  }
  .results-header .ticker-badge {
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .results-header .spot-price {
    font-size: 14px; color: #8b949e;
  }

  .strike-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .strike-table th {
    text-align: left;
    padding: 8px 6px;
    color: #8b949e;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #30363d;
    white-space: nowrap;
  }
  .strike-table th:not(:first-child),
  .strike-table td:not(:first-child) { text-align: right; }
  .strike-table td {
    padding: 10px 6px;
    border-bottom: 1px solid #21262d;
    color: #e1e4e8;
    white-space: nowrap;
  }
  .strike-table tr:last-child td { border-bottom: none; }
  .strike-table tr.active { background: #1c3a2a; }
  .strike-table tr.active td { color: #3fb950; font-weight: 700; }
  .strike-table .ann { color: #3fb950; font-weight: 700; }
  .strike-table tr.dim td { color: #484f58; }

  .note {
    margin-top: 20px; padding: 14px 16px;
    background: #1c2128; border-radius: 8px;
    border-left: 3px solid #58a6ff;
    font-size: 13px; color: #8b949e; line-height: 1.7;
  }
  .note code {
    background: #30363d; padding: 2px 6px; border-radius: 4px;
    font-size: 12px; color: #e1e4e8;
  }
  .error-box {
    margin-top: 20px; padding: 14px 16px;
    background: #1c2128; border-radius: 8px;
    border-left: 3px solid #f85149;
    font-size: 13px; color: #f85149; line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <h1>FCN票据DIY计算器</h1>
  <p class="subtitle">输入标的、接股价、期限、本金 → 自动查询期权链并计算年化收益</p>

  <div class="form-group">
    <label>股票代码 Ticker</label>
    <input type="text" id="ticker" placeholder="AAPL, TSLA, NVDA ..." style="text-transform:uppercase;" oninput="onTickerInput()">
    <div class="hint" id="tickerHint"></div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>接股价 (%现价)</label>
      <input type="number" id="discount" placeholder="例: 90" step="1" value="90">
      <div class="hint">行权价 = 现价 × 接股价%</div>
    </div>
    <div class="form-group">
      <label>期限 (月)</label>
      <input type="number" id="months" placeholder="例: 1" step="1" value="1">
    </div>
  </div>

  <div class="row">
    <div class="form-group" style="flex:2">
      <label>打算投资多少 ($)</label>
      <input type="number" id="capital" placeholder="例: 50000" step="100">
    </div>
    <div class="form-group" style="flex:1">
      <label>手续费/张 ($)</label>
      <input type="number" id="feePerContract" placeholder="1.19" step="0.01" value="1.19">
      <div class="hint">富途默认 $1.19</div>
    </div>
  </div>

  <button class="btn" id="calcBtn" onclick="run()">计算</button>

  <div id="output"></div>

  <div class="note">
    <strong>原理：</strong>Sell Put 并存入 <code>行权价 × 100 × 合约数</code> 现金作为100%保证金，
    相当于自制一张FCN票据。期权金 = 票息，到期OTM则全额收回本金+票息。<br>
    <code>净收入 = 总权利金 - 手续费</code><br>
    <code>年化 = (净收入 / 天数) × 365 / 本金</code><br>
    <code>保本价 = 行权价 - 权利金 + 手续费/100</code>
  </div>
</div>

<script>
const API = '/api';

async function api(type, ticker, date) {
  let url = `${API}?ticker=${ticker}&type=${type}`;
  if (date) url += `&date=${date}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

let tickerTimer = null;
let spotPrice = null;

function onTickerInput() {
  clearTimeout(tickerTimer);
  spotPrice = null;
  const t = document.getElementById('ticker').value.trim().toUpperCase();
  const hint = document.getElementById('tickerHint');
  if (!t) { hint.textContent = ''; hint.className = 'hint'; return; }
  hint.textContent = '查询中...';
  hint.className = 'hint';
  tickerTimer = setTimeout(() => fetchSpot(t), 600);
}

async function fetchSpot(ticker) {
  const hint = document.getElementById('tickerHint');
  try {
    const data = await api('quote', ticker);
    spotPrice = data.price;
    hint.textContent = `${data.name}  现价 $${spotPrice.toFixed(2)}`;
    hint.className = 'hint ok';
  } catch(e) {
    hint.textContent = '未找到该股票：' + e.message;
    hint.className = 'hint err';
    spotPrice = null;
  }
}

function findNearestDate(dates, targetDate) {
  // dates = ['2026-04-10', ...], targetDate = '2026-05-10'
  let best = dates[0];
  let bestDiff = Math.abs(new Date(dates[0]) - new Date(targetDate));
  for (const d of dates) {
    const diff = Math.abs(new Date(d) - new Date(targetDate));
    if (diff < bestDiff) { bestDiff = diff; best = d; }
  }
  return best;
}

function findNearbyPuts(puts, targetStrike, count = 7) {
  const sorted = [...puts].sort((a, b) => Math.abs(a.strike - targetStrike) - Math.abs(b.strike - targetStrike));
  const nearby = sorted.slice(0, count);
  nearby.sort((a, b) => b.strike - a.strike);
  return nearby;
}

async function run() {
  const btn = document.getElementById('calcBtn');
  const output = document.getElementById('output');
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  const discount = parseFloat(document.getElementById('discount').value);
  const months = parseFloat(document.getElementById('months').value);
  const capital = parseFloat(document.getElementById('capital').value);
  const feePerContract = parseFloat(document.getElementById('feePerContract').value) || 1.19;

  if (!ticker || !spotPrice) {
    output.innerHTML = '<div class="error-box">请先输入有效的股票代码，等待现价获取成功</div>';
    return;
  }
  if (!discount || discount <= 0 || discount > 100) {
    output.innerHTML = '<div class="error-box">请输入合理的接股价（1-100%）</div>';
    return;
  }
  if (!months || months <= 0) {
    output.innerHTML = '<div class="error-box">请输入期限月数</div>';
    return;
  }
  if (!capital || capital <= 0) {
    output.innerHTML = '<div class="error-box">请输入投资金额</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = '查询期权链中...';
  btn.className = 'btn loading';

  try {
    const targetStrike = spotPrice * (discount / 100);
    const targetDTE = Math.round(months * 30.4);
    const now = new Date();
    const targetDate = new Date(now.getTime() + targetDTE * 86400000);
    const targetDateStr = targetDate.toISOString().slice(0, 10);

    // Fetch expirations
    const expData = await api('expirations', ticker);
    const expirations = expData.expirations;

    if (!expirations || !expirations.length) {
      throw new Error('该标的没有可用的期权数据');
    }

    const bestExpiry = findNearestDate(expirations, targetDateStr);

    // Fetch option chain for this date
    const chainData = await api('options', ticker, bestExpiry);
    const puts = chainData.puts;

    if (!puts || !puts.length) {
      throw new Error('该到期日没有Put期权数据');
    }

    const nearbyPuts = findNearbyPuts(puts, targetStrike, 7);
    const expiryDate = new Date(bestExpiry + 'T00:00:00');
    const actualDTE = Math.round((expiryDate - now) / 86400000);
    const expiryStr = bestExpiry;

    const priceLabel = 'Bid';

    // Find which strike is closest to target
    let bestIdx = 0;
    let bestDiff = Infinity;
    nearbyPuts.forEach((p, i) => {
      const diff = Math.abs(p.strike - targetStrike);
      if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
    });

    const feePerShare = feePerContract / 100;

    // Build table rows
    const rows = nearbyPuts.map((p, i) => {
      const strike = p.strike;
      const bid = p.bid > 0 ? p.bid : 0;
      const pctSpot = (strike / spotPrice * 100);

      if (!bid) {
        const isActive = i === bestIdx;
        return `<tr class="${isActive ? 'active' : ''} dim">
          <td>$${strike.toFixed(1)}</td>
          <td>${pctSpot.toFixed(1)}%</td>
          <td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>
        </tr>`;
      }

      const contracts = Math.floor(capital / (strike * 100));
      const totalPremium = contracts * bid * 100;
      const totalFee = contracts * feePerContract;
      const netPremium = totalPremium - totalFee;
      const breakeven = strike - bid + feePerShare;
      const effectiveDiscount = ((spotPrice - breakeven) / spotPrice * 100);
      const annRet = (actualDTE > 0 && contracts > 0 && netPremium > 0)
        ? (netPremium / actualDTE) * 365 / capital * 100 : 0;
      const isActive = i === bestIdx;
      const isDim = contracts === 0;

      return `<tr class="${isActive ? 'active' : ''} ${isDim ? 'dim' : ''}">
        <td>$${strike.toFixed(1)}</td>
        <td>${pctSpot.toFixed(1)}%</td>
        <td>$${bid.toFixed(2)}</td>
        <td>${effectiveDiscount.toFixed(1)}%</td>
        <td>${contracts}</td>
        <td>${netPremium > 0 ? '$' + netPremium.toLocaleString('en-US', {maximumFractionDigits: 0}) : '-'}</td>
        <td class="ann">${annRet > 0 ? annRet.toFixed(1) + '%' : '-'}</td>
        <td>$${breakeven.toFixed(2)}</td>
      </tr>`;
    }).join('');

    output.innerHTML = `
      <div class="results">
        <div class="results-header">
          <span class="ticker-badge">${ticker} Sell Put</span>
          <span class="spot-price">现价 $${spotPrice.toFixed(2)} | 到期 ${expiryStr} (${actualDTE}天)</span>
        </div>
        <div style="padding:12px; overflow-x:auto;">
          <table class="strike-table">
            <thead>
              <tr>
                <th>行权价</th>
                <th>%现价</th>
                <th>${priceLabel}</th>
                <th>折扣</th>
                <th>可卖</th>
                <th>净收入</th>
                <th>年化</th>
                <th>保本价</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  } catch (e) {
    output.innerHTML = `<div class="error-box">${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '计算';
    btn.className = 'btn';
  }
}
</script>
</body>
</html>
