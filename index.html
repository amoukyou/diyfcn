<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCN票据DIY计算器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .container { max-width: 520px; width: 100%; }
  h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #8b949e; margin-bottom: 28px; line-height: 1.5; }
  .form-group { margin-bottom: 18px; }
  label {
    display: block; font-size: 13px; font-weight: 600;
    color: #8b949e; margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  input, select {
    width: 100%; padding: 12px 14px; font-size: 18px;
    background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; color: #fff; outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: #58a6ff; }
  input::placeholder { color: #484f58; }
  .row { display: flex; gap: 12px; }
  .row .form-group { flex: 1; }
  .hint { font-size: 12px; color: #484f58; margin-top: 4px; }
  .hint.ok { color: #3fb950; }
  .hint.warn { color: #d29922; }
  .hint.err { color: #f85149; }

  .btn {
    width: 100%; padding: 14px; font-size: 16px; font-weight: 700;
    background: #238636; color: #fff; border: none; border-radius: 8px;
    cursor: pointer; margin-top: 8px; transition: background 0.2s;
  }
  .btn:hover { background: #2ea043; }
  .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  .btn.loading { background: #30363d; }

  .results {
    margin-top: 28px; background: #161b22;
    border: 1px solid #30363d; border-radius: 12px;
    overflow: hidden;
  }
  .results-header {
    padding: 16px 20px; background: #1c2128;
    border-bottom: 1px solid #30363d;
    display: flex; justify-content: space-between; align-items: center;
  }
  .results-header .ticker-badge {
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .results-header .spot-price {
    font-size: 14px; color: #8b949e;
  }
  .results-body { padding: 8px 20px; }

  .result-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #21262d;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row .lbl { font-size: 14px; color: #8b949e; }
  .result-row .val { font-size: 18px; font-weight: 700; color: #e1e4e8; text-align: right; }
  .result-row .val.green { color: #3fb950; }
  .result-row .val.big { font-size: 26px; color: #3fb950; }
  .result-row .val .sub { font-size: 12px; color: #8b949e; font-weight: 400; display: block; }

  .section-title {
    font-size: 11px; font-weight: 700; color: #58a6ff;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 14px 0 4px; border-bottom: none;
  }

  .divider { height: 1px; background: #30363d; margin: 0; }

  .note {
    margin-top: 20px; padding: 14px 16px;
    background: #1c2128; border-radius: 8px;
    border-left: 3px solid #58a6ff;
    font-size: 13px; color: #8b949e; line-height: 1.7;
  }
  .note code {
    background: #30363d; padding: 2px 6px; border-radius: 4px;
    font-size: 12px; color: #e1e4e8;
  }
  .error-box {
    margin-top: 20px; padding: 14px 16px;
    background: #1c2128; border-radius: 8px;
    border-left: 3px solid #f85149;
    font-size: 13px; color: #f85149; line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <h1>FCN票据DIY计算器</h1>
  <p class="subtitle">输入标的、折扣、期限、本金 → 自动查询期权链并计算年化收益</p>

  <div class="form-group">
    <label>股票代码 Ticker</label>
    <input type="text" id="ticker" placeholder="AAPL, TSLA, NVDA ..." style="text-transform:uppercase;" oninput="onTickerInput()">
    <div class="hint" id="tickerHint"></div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>接股价 (%现价)</label>
      <input type="number" id="discount" placeholder="例: 90" step="1" value="90">
      <div class="hint">行权价 = 现价 × 接股价%</div>
    </div>
    <div class="form-group">
      <label>期限 (月)</label>
      <input type="number" id="months" placeholder="例: 1" step="1" value="1">
    </div>
  </div>

  <div class="form-group">
    <label>打算投资多少 ($)</label>
    <input type="number" id="capital" placeholder="例: 50000" step="100">
  </div>

  <button class="btn" id="calcBtn" onclick="run()">计算</button>

  <div id="output"></div>

  <div class="note">
    <strong>原理：</strong>Sell Put 并存入 <code>行权价 × 100 × 合约数</code> 现金作为100%保证金，
    相当于自制一张FCN票据。期权金 = 票息，到期OTM则全额收回本金+票息。<br>
    <code>年化 = (期权金 / 行权价) × (365 / 天数)</code>
  </div>
</div>

<script>
// ---- API Config ----
// Auto-detect: local server (python server.py) or Cloudflare Worker
const LOCAL_API = '/api';
const WORKER_URL = 'https://fcn-api.btcmini.workers.dev';

async function apiFetch(type, ticker, date) {
  // Try local server first (when running via python server.py)
  const apis = [LOCAL_API, WORKER_URL];
  for (const base of apis) {
    try {
      let url = `${base}?ticker=${ticker}&type=${type}`;
      if (date) url += `&date=${date}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      // Check for Yahoo auth errors
      if (data.finance && data.finance.error) continue;
      return data;
    } catch { continue; }
  }
  throw new Error('数据获取失败，请确认 python server.py 正在运行');
}

let tickerTimer = null;
let spotPrice = null;

function onTickerInput() {
  clearTimeout(tickerTimer);
  spotPrice = null;
  const t = document.getElementById('ticker').value.trim().toUpperCase();
  const hint = document.getElementById('tickerHint');
  if (!t) { hint.textContent = ''; hint.className = 'hint'; return; }
  hint.textContent = '查询中...';
  hint.className = 'hint';
  tickerTimer = setTimeout(() => fetchSpot(t), 600);
}

async function fetchSpot(ticker) {
  const hint = document.getElementById('tickerHint');
  try {
    const data = await apiFetch('quote', ticker);
    const r = data.chart.result;
    if (!r || !r.length) throw new Error('未找到');
    spotPrice = r[0].meta.regularMarketPrice;
    const name = r[0].meta.shortName || r[0].meta.symbol;
    hint.textContent = `${name}  现价 $${spotPrice.toFixed(2)}`;
    hint.className = 'hint ok';
  } catch(e) {
    hint.textContent = '未找到该股票：' + e.message;
    hint.className = 'hint err';
    spotPrice = null;
  }
}

async function fetchOptionChain(ticker) {
  const data = await apiFetch('options', ticker);
  return data.optionChain.result[0];
}

async function fetchOptionForDate(ticker, epoch) {
  const data = await apiFetch('options', ticker, epoch);
  return data.optionChain.result[0];
}

function findNearestExpiry(expirations, targetEpoch) {
  let best = expirations[0];
  let bestDiff = Math.abs(expirations[0] - targetEpoch);
  for (const exp of expirations) {
    const diff = Math.abs(exp - targetEpoch);
    if (diff < bestDiff) { bestDiff = diff; best = exp; }
  }
  return best;
}

function findNearestStrikePut(puts, targetStrike) {
  let best = null;
  let bestDiff = Infinity;
  for (const p of puts) {
    const diff = Math.abs(p.strike - targetStrike);
    if (diff < bestDiff) { bestDiff = diff; best = p; }
  }
  return best;
}

async function run() {
  const btn = document.getElementById('calcBtn');
  const output = document.getElementById('output');
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  const discount = parseFloat(document.getElementById('discount').value);
  const months = parseFloat(document.getElementById('months').value);
  const capital = parseFloat(document.getElementById('capital').value);

  if (!ticker || !spotPrice) {
    output.innerHTML = '<div class="error-box">请先输入有效的股票代码，等待现价获取成功</div>';
    return;
  }
  if (!discount || discount <= 0 || discount > 100) {
    output.innerHTML = '<div class="error-box">请输入合理的接股价（1-100%）</div>';
    return;
  }
  if (!months || months <= 0) {
    output.innerHTML = '<div class="error-box">请输入期限月数</div>';
    return;
  }
  if (!capital || capital <= 0) {
    output.innerHTML = '<div class="error-box">请输入投资金额</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = '查询期权链中...';
  btn.className = 'btn loading';

  try {
    const targetStrike = spotPrice * (discount / 100);
    const targetDTE = Math.round(months * 30.4);
    const now = Math.floor(Date.now() / 1000);
    const targetEpoch = now + targetDTE * 86400;

    // Fetch option chain
    const chain = await fetchOptionChain(ticker);
    const expirations = chain.expirationDates;

    if (!expirations || !expirations.length) {
      throw new Error('该标的没有可用的期权数据');
    }

    const bestExpiry = findNearestExpiry(expirations, targetEpoch);
    const expiryData = await fetchOptionForDate(ticker, bestExpiry);
    const puts = expiryData.options[0].puts;

    if (!puts || !puts.length) {
      throw new Error('该到期日没有Put期权数据');
    }

    const bestPut = findNearestStrikePut(puts, targetStrike);
    const actualStrike = bestPut.strike;
    const premium = bestPut.lastPrice || bestPut.ask || 0;
    const bid = bestPut.bid || 0;
    const ask = bestPut.ask || 0;
    const mid = bid > 0 && ask > 0 ? (bid + ask) / 2 : premium;
    const iv = bestPut.impliedVolatility || 0;

    const expiryDate = new Date(bestExpiry * 1000);
    const actualDTE = Math.round((bestExpiry - now) / 86400);

    // Calculations
    const marginPerContract = actualStrike * 100;
    const contracts = Math.floor(capital / marginPerContract);

    if (contracts < 1) {
      throw new Error(`本金不足：需要至少 $${marginPerContract.toLocaleString()} 才能卖1张（行权价 $${actualStrike} × 100股）`);
    }

    const totalMargin = contracts * marginPerContract;
    const totalPremiumMid = contracts * mid * 100;
    const totalPremiumBid = contracts * bid * 100;
    const holdReturn = mid / actualStrike * 100;
    const annReturn = holdReturn * (365 / actualDTE);
    const actualDiscount = ((spotPrice - actualStrike) / spotPrice * 100);
    const breakeven = actualStrike - mid;
    const maxProtection = ((spotPrice - breakeven) / spotPrice * 100);
    const remainCash = capital - totalMargin;

    const expiryStr = expiryDate.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });

    output.innerHTML = `
      <div class="results">
        <div class="results-header">
          <span class="ticker-badge">${ticker} PUT $${actualStrike}</span>
          <span class="spot-price">现价 $${spotPrice.toFixed(2)} | 到期 ${expiryStr}</span>
        </div>
        <div class="results-body">
          <div class="section-title">匹配参数</div>
          <div class="result-row">
            <span class="lbl">到期天数</span>
            <span class="val">${actualDTE} 天 <span class="sub">目标 ${targetDTE} 天 (${months}个月)</span></span>
          </div>
          <div class="result-row">
            <span class="lbl">实际行权价</span>
            <span class="val">$${actualStrike.toFixed(2)} <span class="sub">现价的 ${(100 - actualDiscount).toFixed(1)}%（目标 ${discount}%）</span></span>
          </div>
          <div class="result-row">
            <span class="lbl">期权报价 Bid / Ask</span>
            <span class="val">$${bid.toFixed(2)} / $${ask.toFixed(2)} <span class="sub">中间价 $${mid.toFixed(2)} | IV ${(iv*100).toFixed(0)}%</span></span>
          </div>

          <div class="divider"></div>
          <div class="section-title">投资计算</div>
          <div class="result-row">
            <span class="lbl">可卖合约数</span>
            <span class="val">${contracts} 张 <span class="sub">每张保证金 $${marginPerContract.toLocaleString()}</span></span>
          </div>
          <div class="result-row">
            <span class="lbl">占用保证金</span>
            <span class="val">$${totalMargin.toLocaleString()} <span class="sub">剩余现金 $${remainCash.toLocaleString()}</span></span>
          </div>
          <div class="result-row">
            <span class="lbl">收取期权金（票息）</span>
            <span class="val green">$${totalPremiumMid.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')} <span class="sub">按中间价 | Bid价 $${totalPremiumBid.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</span></span>
          </div>

          <div class="divider"></div>
          <div class="section-title">收益分析</div>
          <div class="result-row">
            <span class="lbl">持有期收益率</span>
            <span class="val green">${holdReturn.toFixed(2)}%<span class="sub">${actualDTE}天</span></span>
          </div>
          <div class="result-row">
            <span class="lbl">年化收益率</span>
            <span class="val big">${annReturn.toFixed(2)}%</span>
          </div>
          <div class="result-row">
            <span class="lbl">盈亏平衡价</span>
            <span class="val">$${breakeven.toFixed(2)} <span class="sub">低于现价 ${maxProtection.toFixed(1)}%</span></span>
          </div>
        </div>
      </div>
    `;
  } catch (e) {
    output.innerHTML = `<div class="error-box">${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '计算';
    btn.className = 'btn';
  }
}
</script>
</body>
</html>
